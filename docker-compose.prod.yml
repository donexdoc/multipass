# Production docker-compose.
#
# Required environment (place in .env alongside this file on the server):
#   POSTGRES_USER, POSTGRES_PASSWORD
#   JWT_SECRET, JWT_REFRESH_SECRET
#   ADMIN_LOGIN, ADMIN_PASSWORD
#   CORS_ORIGIN          — e.g. https://multipass.example.com
#   APP_PORT             — host port exposed to the world (default: 80)
#   IMAGE_BE             — full registry path, e.g. registry.gitlab.example.com/group/multipass/be
#   IMAGE_FE             — full registry path, e.g. registry.gitlab.example.com/group/multipass/fe
#   IMAGE_TAG            — Docker image tag to deploy (set by CI to $CI_COMMIT_SHA)
#
# Run:
#   IMAGE_TAG=<sha> docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       multipass
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backups:/backups          # backup dumps land here
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app

  be:
    image: ${IMAGE_BE}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      DATABASE_URL:           postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/multipass
      JWT_SECRET:             ${JWT_SECRET}
      JWT_REFRESH_SECRET:     ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN:  ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      PORT:                   4000
      CORS_ORIGIN:            ${CORS_ORIGIN}
      ADMIN_LOGIN:            ${ADMIN_LOGIN}
      ADMIN_PASSWORD:         ${ADMIN_PASSWORD}
      NODE_ENV:               production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app

  fe:
    image: ${IMAGE_FE}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      - be
    networks:
      - app

volumes:
  pgdata:

networks:
  app:
    name: multipass_net
